<!DOCTYPE html>

<html class="light" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Chỉnh sửa Tuyến đường - The Fluid Terminal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "on-primary-container": "#f3f7ff",
            "on-error": "#ffffff",
            "secondary-fixed-dim": "#b4cad6",
            "error-container": "#ffdad6",
            "surface-container-lowest": "#ffffff",
            "tertiary-fixed-dim": "#ffb877",
            "on-secondary-container": "#526772",
            "surface-bright": "#f7f9fb",
            "surface-dim": "#d8dadc",
            "surface-variant": "#e0e3e5",
            "on-background": "#191c1e",
            "surface-container": "#eceef0",
            "on-primary-fixed-variant": "#004b74",
            "primary-container": "#0077b6",
            "error": "#ba1a1a",
            "primary-fixed": "#cde5ff",
            "tertiary": "#864a00",
            "primary-fixed-dim": "#94ccff",
            "inverse-surface": "#2d3133",
            "tertiary-container": "#a95f00",
            "on-tertiary-fixed-variant": "#6c3a00",
            "on-secondary-fixed": "#071e27",
            "inverse-primary": "#94ccff",
            "on-tertiary": "#ffffff",
            "surface-container-highest": "#e0e3e5",
            "outline-variant": "#bfc7d1",
            "surface-container-high": "#e6e8ea",
            "on-surface-variant": "#404850",
            "on-secondary-fixed-variant": "#354a53",
            "secondary-container": "#cfe6f2",
            "primary": "#005d90",
            "surface-tint": "#006399",
            "on-tertiary-container": "#fff6f1",
            "on-primary": "#ffffff",
            "surface-container-low": "#f2f4f6",
            "outline": "#707881",
            "on-surface": "#191c1e",
            "background": "#f7f9fb",
            "surface": "#f7f9fb",
            "on-primary-fixed": "#001d32",
            "inverse-on-surface": "#eff1f3",
            "secondary-fixed": "#cfe6f2",
            "secondary": "#4c616c",
            "on-tertiary-fixed": "#2e1600",
            "on-error-container": "#93000a",
            "tertiary-fixed": "#ffdcc0",
            "on-secondary": "#ffffff"
          },
          fontFamily: {
            "headline": ["Manrope"],
            "body": ["Inter"],
            "label": ["Inter"]
          },
          borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      vertical-align: middle;
    }
    body {
      font-family: 'Inter', sans-serif;
    }
    h1, h2, h3 {
      font-family: 'Manrope', sans-serif;
    }
    .modal-overlay {
      background-color: rgba(25, 28, 30, 0.4);
      backdrop-filter: blur(4px);
    }
    .ambient-shadow {
      box-shadow: 0 8px 24px rgba(25, 28, 30, 0.06);
    }
    .ghost-border {
      border: 1px solid rgba(191, 199, 209, 0.2);
    }
    input:focus, select:focus {
      outline: none;
      border-color: rgba(0, 93, 144, 0.3) !important;
      background-color: #ffffff !important;
    }
  </style>
</head>
<body class="bg-surface text-on-surface flex items-center justify-center min-h-screen p-6">
<!-- Background Content Simulation (Dimmed) -->
<div class="fixed inset-0 z-0 overflow-hidden pointer-events-none opacity-20">
<div class="p-12 max-w-7xl mx-auto space-y-8">
<div class="h-12 w-64 bg-surface-container-highest rounded-lg"></div>
<div class="grid grid-cols-3 gap-6">
<div class="h-48 bg-surface-container-low rounded-xl"></div>
<div class="h-48 bg-surface-container-low rounded-xl"></div>
<div class="h-48 bg-surface-container-low rounded-xl"></div>
</div>
<div class="h-96 w-full bg-surface-container-low rounded-xl"></div>
</div>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-10 modal-overlay flex items-center justify-center p-4 sm:p-6">
<!-- Modal Dialog -->
<div class="bg-surface-container-lowest w-full max-w-lg rounded-xl overflow-hidden ambient-shadow flex flex-col transform transition-all">
<!-- Header -->
<div class="px-8 pt-8 pb-6 flex items-center gap-4">
<div class="w-12 h-12 rounded-xl bg-primary-fixed flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-3xl" data-icon="route">route</span>
</div>
<div>
<h2 class="text-2xl font-extrabold tracking-tight text-on-surface">Chỉnh sửa Tuyến đường</h2>
<p class="text-sm text-on-surface-variant font-medium">Cập nhật thông tin chi tiết hành trình</p>
</div>
</div>
<!-- Form Content -->
<form class="px-8 py-2 space-y-6">
<!-- Row: Route ID (Read Only) -->
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-1">Mã tuyến</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant" data-icon="fingerprint">fingerprint</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-low border-none rounded-xl text-on-surface-variant font-mono cursor-not-allowed" readonly="" type="text" value="RT-2024-01"/>
</div>
</div>
<!-- Row: Stations -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-1">Ga đi</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-primary" data-icon="location_on">location_on</span>
<select class="w-full pl-12 pr-4 py-3.5 bg-surface-container-high border-none rounded-xl text-on-surface font-medium appearance-none cursor-pointer hover:bg-surface-container-highest transition-colors">
<option value="HN">Ga Hà Nội</option>
<option selected="" value="DN">Ga Đà Nẵng</option>
<option value="SG">Ga Sài Gỗn</option>
<option value="HP">Ga Hải Phòng</option>
</select>
</div>
</div>
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-1">Ga đến</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-primary" data-icon="flag">flag</span>
<select class="w-full pl-12 pr-4 py-3.5 bg-surface-container-high border-none rounded-xl text-on-surface font-medium appearance-none cursor-pointer hover:bg-surface-container-highest transition-colors">
<option value="HN">Ga Hà Nội</option>
<option value="DN">Ga Đà Nẵng</option>
<option selected="" value="SG">Ga Sài Gỗn</option>
<option value="HP">Ga Hải Phòng</option>
</select>
</div>
</div>
</div>
<!-- Row: Distance & Status -->
<div class="grid-cols-1 gap-4">
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-1">Khoảng cách (km)</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant" data-icon="straighten">straighten</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-high border-none rounded-xl text-on-surface font-medium" placeholder="0.0" type="number" value="791"/>
</div>
</div>
</div>
</form>
<!-- Footer Actions -->
<div class="px-8 py-8 mt-4 flex flex-col sm:flex-row-reverse gap-3">
<button class="flex-1 bg-primary text-on-primary font-bold py-3.5 px-6 rounded-xl hover:bg-primary-container active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="button">
<span class="material-symbols-outlined" data-icon="save">save</span>
          Cập nhật Tuyến đường
        </button>
<button class="flex-1 bg-secondary-container text-on-secondary-container font-semibold py-3.5 px-6 rounded-xl hover:bg-surface-container-highest active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="button">
          Hủy bỏ
        </button>
</div>
</div>
</div>
<!-- Decorative Gradient Background Image for context -->
<div class="fixed inset-0 -z-20">
<div class="absolute inset-0 bg-surface"></div>
<div class="absolute inset-0 opacity-40 bg-[radial-gradient(circle_at_top_right,_#cfe6f2_0%,_transparent_50%),_radial-gradient(circle_at_bottom_left,_#e0e3e5_0%,_transparent_50%)]"></div>
</div>
</body></html>
